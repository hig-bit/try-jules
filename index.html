<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タスク管理アプリ</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-tasks"></i> タスク管理</h1>
            <div class="input-container">
                <input type="text" id="taskInput" placeholder="新しいタスクを入力...">
                <button id="addTaskBtn"><i class="fas fa-plus"></i> 追加</button>
            </div>
        </header>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">すべて</button>
            <button class="filter-btn" data-filter="active">未完了</button>
            <button class="filter-btn" data-filter="completed">完了</button>
        </div>
        
        <ul id="taskList">
            <!-- タスクがここに追加されます -->
        </ul>
        
        <div class="task-stats">
            <span id="taskCount">0 件のタスク</span>
            <button id="clearCompleted">完了したタスクを削除</button>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
